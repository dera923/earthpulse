<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EarthPulse 地震マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.6812, 139.7671], 5); // 東京中心

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    fetch("/earthquakes")
      .then(res => res.json())
      .then(data => {
       console.log("取得したデータ:", data);

        // 安全性チェック：features が配列であること
        if (!data.features || !Array.isArray(data.features)) {
          throw new Error("GeoJSONのfeaturesが存在しないか不正です");
        }

        data.features.forEach(feature => {
          const coords = feature.geometry.coordinates;
          const lon = coords[0];
          const lat = coords[1];
          const mag = parseFloat(feature.properties.mag) || 1.0;
          const place = feature.properties.place || "Unknown location";

          L.circleMarker([lat, lon], {
            radius: 4 + mag,
            color: "red",
            fillOpacity: 0.6
          }).bindPopup(`<b>${place}</b><br>Magnitude: ${mag}`).addTo(map);
        });
      })
      .catch(error => {
        console.error("地震データの取得に失敗:", error);
      });
  </script>
</body>
</html>
